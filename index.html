<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yayasan Pengabdi Sesama Manusia</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <section class="hero-section">
        <div class="slider">
            <!-- Image -->
            <div class="list">
                <div class="item">
                    <img src="Sukuna.jpg" alt="Sukuna">                   
                </div>
                <div class="item">
                    <img src="Tanjiro.jpg" alt="Tanjiro">
                </div>
                <div class="item">
                    <img src="Yuta.jpg" alt="Yuta">
                </div>
            </div>
            
            <!-- Button Prev/Next -->
            <div class="buttons">
                <button id="prev"><</button>
                <button id="next">></button>
            </div>

            <!-- Dots -->
            <ul class="dots">
                <li class="active"></li>
                <li></li>
                <li></li>
            </ul>
        </div>

        <div class="welcome">
            <div class="welcome-text">
                <h2>Selamat Datang di Yayasan Pengabdi Sesama Manusia</h2>
            </div>
            <div>
                <img src="Sukuna.jpg" alt="Sukuna" class="site-logo">
            </div>
        </div>

    </section>

    <script src="script.js"></script>
</body>
</html>
